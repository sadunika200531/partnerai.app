version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: monitor_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:securepassword@db:5432/monitor_db
    depends_on:
      - db

volumes:
  postgres_data: