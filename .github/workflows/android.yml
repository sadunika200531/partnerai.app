name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      run: |
        # ඇන්ඩ්‍රොයිඩ් ප්‍රොජෙක්ට් එක තියෙන තැන සොයාගනී
        PROJECT_PATH=$(find . -name "build.gradle*" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
        cd "$PROJECT_PATH"
        
        # gradlew ෆයිල් එක නැතිනම් අලුතින් සාදයි
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build with Gradle
      run: |
        PROJECT_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
        cd "$PROJECT_PATH"
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: "**/app/build/outputs/apk/debug/app-debug.apk"
